<!-- Индикатор пинга устройства -->
<div id="ping-indicator">
    <span id="ping-dot" class="ping-dot idle"></span>
    <span id="ping-text">...</span>
</div>

<!-- Грид сетка, по которой распологаются элементы -->
<div id="grid"></div>

<!-- Курс аппарата -->

<!-- Настройки ROSBridge -->
<div class="connection-settings">
    <div class="connection-settings-inner">
        <div class="connection-settings-row">
            <span class="connection-settings-label">ROSBridge</span>
        </div>
        <div class="connection-settings-fields">
            <select
                id="rosbridge-host-select"
                class="connection-input connection-input--select"
            ></select>
            <input
                type="text"
                id="rosbridge-host-custom"
                class="connection-input connection-input--custom"
                placeholder="свой хост"
            >
            <input
                type="hidden"
                id="rosbridge-host"
                value="{{ rosbridge_host }}"
            >
        </div>
        <div class="connection-settings-fields">
            <select
                id="rosbridge-port-select"
                class="connection-input connection-input--port connection-input--select"
            >
                <option value="9090">9090</option>
                <option value="9091">9091</option>
                <option value="custom">свой порт</option>
            </select>
            <input
                type="number"
                id="rosbridge-port-custom"
                class="connection-input connection-input--port connection-input--custom"
                placeholder="свой порт"
                min="1"
                max="65535"
            >
            <input
                type="hidden"
                id="rosbridge-port"
                value="{{ rosbridge_port }}"
            >
        </div>
    </div>
</div>

<!-- Кнопка подключения к ROS (нужна для отладки) -->
<button class="connection-form" id="connection-form" onclick="connectToROS()">Connect to ROS</button>

<!-- Дополнительная реалиция перехода сайта в режим fullscreen, если не сработал автоматический переход -->
<div id="fs-prompt">
    Нажмите, чтобы открыть страницу на весь экран
    <button>Полноэкранный&nbsp;режим</button>
</div>

<!-- Если устройсво находится в портретном режиме, то перед пользователем вылезает данное сообщение -->
<div id="orientation-overlay">
    Пожалуйста, поверните устройство в альбомную ориентацию
</div>
